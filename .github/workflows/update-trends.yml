name: Update Food Bank Trends Data

on:
  schedule:
    # Every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch-trends:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch Google Trends data
        run: python scripts/fetch_trends.py --output data/trends_data.json
        env:
          PYTHONUNBUFFERED: '1'
        continue-on-error: true
        id: fetch

      - name: Check fetch result
        if: steps.fetch.outcome == 'failure'
        run: |
          echo "::warning::Google Trends fetch failed (likely rate-limited). Keeping existing data."
          echo "The script will retry on the next scheduled run."

      - name: Check if data changed
        if: steps.fetch.outcome == 'success'
        id: check_changes
        run: |
          if git diff --quiet data/trends_data.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data changes detected, will commit"
          fi

      - name: Commit and push updated data
        if: steps.fetch.outcome == 'success' && steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trends_data.json
          git commit -m "Update trends data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
